# 횆혨찼쨩혮i t횄짧n file th횄혻nh application.properties n찼쨘쩔u 횆혩ang l횄혻 .yml
spring.application.name=api

# Database configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MotelManagement;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Tien3859@
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Jackson configuration - Convert camelCase to snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE

# File upload
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
